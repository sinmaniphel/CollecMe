imports:
    - { resource: parameters.yml }
    - { resource: security.yml }
    - { resource: services.yml }

framework:
    #esi:             ~
    translator:      { fallbacks: ["%locale%"] }
    secret:          "%secret%"
    router:
        resource: "%kernel.root_dir%/config/routing.yml"
        strict_requirements: ~
    form:            ~
    csrf_protection: ~
    validation:      { enable_annotations: true }
    templating:
        engines: ['twig']
        #assets_version: SomeVersionScheme
    default_locale:  "%locale%"
    trusted_hosts:   ~
    trusted_proxies: ~
    session:
        # handler_id set to null will use default session handler from php.ini
        handler_id:  ~
    fragments:       ~
    http_method_override: true

# Twig Configuration
twig:
    debug:            "%kernel.debug%"
    strict_variables: "%kernel.debug%"

# Assetic Configuration
assetic:
    debug:          "%kernel.debug%"
    use_controller: false
    bundles:        [ CollecMeCollectionBundle]
    #java: /usr/bin/java
    filters:
        cssrewrite: ~
        less:
          node: /usr/bin/node
          node_paths: [/usr/local/lib/node_modules]
          applys_to: "\.less$"
        #closure:
        #    jar: "%kernel.root_dir%/Resources/java/compiler.jar"
        #yui_css:
        #    jar: "%kernel.root_dir%/Resources/java/yuicompressor-2.4.7.jar"

braincrafted_bootstrap:
  less_filter: less
  jquery_path: %kernel.root_dir%/../web/bower/jquery/dist/jquery.js
  customize:
    variables_file: %kernel.root_dir%/Resources/less/collecme.less 


# Ivory Ck Adapter, providing CKEditor support
ivory_ck_editor:
    inline: true
    input_sync: true
    
# Doctrine Configuration
doctrine:
    dbal:
        driver:   "%database_driver%"
        host:     "%database_host%"
        port:     "%database_port%"
        dbname:   "%database_name%"
        user:     "%database_user%"
        password: "%database_password%"
        charset:  UTF8
        # if using pdo_sqlite as your database driver:
        #   1. add the path in parameters.yml
        #     e.g. database_path: "%kernel.root_dir%/data/data.db3"
        #   2. Uncomment database_path in parameters.yml.dist
        #   3. Uncomment next line:
        #     path:     "%database_path%"

    orm:
        auto_generate_proxy_classes: "%kernel.debug%"
        auto_mapping: true
# Friends of symfony UserBundle
fos_user:
    db_driver: orm # other valid values are 'mongodb', 'couchdb' and 'propel'
    firewall_name: main
    user_class: CollecMe\CollectionBundle\Entity\AppUser

# JMS automagic translation framework
jms_translation:
    source_language: en
    locales: [fr,en,de]

    configs:
      # Use the -app config to extract all translations
        app:
            dirs: [%kernel.root_dir%, %kernel.root_dir%/../src,%kernel.root_dir%/Resources/translations]
            output_dir: %kernel.root_dir%/Resources/translations
            ignored_domains: [routes]
            excluded_names: ["*TestCase.php", "*Test.php"]
            excluded_dirs: [cache, data, logs]
            extractors: [jms_i18n_routing]

jms_i18n_routing:
    default_locale: fr
    locales: [fr, en, de]
    strategy: prefix_except_default

    
# Imagine image bundle
liip_imagine:
    resolvers:
       default:
          web_path: ~

    filter_sets:
        cache: ~
        list_thumb:
            quality: 75
            filters:
                thumbnail: { size: [360, 600], mode: inset }
        it_md_thumb:
          quality: 60
          filters:
            thumbnail: { size: [640,480], mode:inset }
    
